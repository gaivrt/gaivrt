name: Scheduled Rebuild

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时自动重建
  workflow_dispatch:         # 手动触发按钮

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages rebuild
        run: curl -X POST "${{ secrets.CF_DEPLOY_HOOK }}" --fail --silent --show-error
